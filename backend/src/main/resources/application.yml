spring:
  application:
    name: investment-monitor-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/investment_monitor}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DATABASE_MAX_POOL_SIZE:5}
      minimum-idle: ${DATABASE_MIN_IDLE:1}
      connection-timeout: ${DATABASE_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQURldmVsb3BtZW50S2V5VGhhdFNob3VsZEJlUmVwbGFjZWRJblByb2R1Y3Rpb24xMjM0NTY=}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
